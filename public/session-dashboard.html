<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Monitor</title>
<link rel="stylesheet" href="/styles/session.css" />
</head>
<body>

<div class="app-shell">

<header class="header">
  <div class="header-left">
    <h1>Session Monitor</h1>
    <span class="subtitle">Claude Code 终端状态</span>
  </div>
  <div class="header-right">
    <div class="search-box">
      <input type="text" id="search-input" class="search-input" placeholder="搜索标题 / prompt / 摘要…" />
    </div>
    <div class="header-meta">
      <button class="theme-toggle" id="theme-toggle" title="切换暗色模式">🌙</button>
      <button class="settings-btn" id="settings-btn" title="状态颜色设置">⚙️</button>
      <span class="last-update" id="last-update">—</span>
      <div class="connection-badge" id="connection-badge">
        <span class="connection-dot"></span>
        <span id="connection-text">实时</span>
      </div>
    </div>
  </div>
</header>

<div class="status-bar-summary" id="status-bar-summary">
  <div class="total-label">共 <strong id="total-count-top">0</strong> 个任务</div>
  <div class="status-tags">
    <span class="status-tag working">执行中 <span class="tag-count" id="count-working">0</span></span>
    <span class="status-tag interrupt">等待输入 <span class="tag-count" id="count-interrupt">0</span></span>
<span class="status-tag waiting">等待中 <span class="tag-count" id="count-waiting">0</span></span>
    <span class="status-tag idle">空闲 <span class="tag-count" id="count-idle">0</span></span>
    <span class="status-tag done">已完成 <span class="tag-count" id="count-done">0</span></span>
  </div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">全部 <span class="count" id="total-count">0</span></button>
</div>

<div class="projects" id="projects">
  <div class="empty-state" id="empty-state">
    <div class="icon">⊡</div>
    <h2>等待会话数据</h2>
    <p>Claude Code 会话日志将在此实时显示。</p>
  </div>
</div>

</div>

<!-- ─── 详情弹窗 ─── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-loading">加载中…</div>
    </div>
  </div>
</div>

<!-- ─── 设置弹窗 ─── -->
<div class="modal-overlay" id="settings-overlay">
  <div class="modal modal-sm" id="settings-modal">
    <div class="modal-header">
      <div class="modal-title">状态颜色设置</div>
      <button class="modal-close" id="settings-close">✕</button>
    </div>
    <div class="modal-body" id="settings-body">
      <div class="settings-grid" id="settings-grid"></div>
      <div class="settings-footer">
        <button class="settings-reset" id="settings-reset">恢复默认</button>
      </div>
    </div>
  </div>
</div>

<script src="/scripts/session-card.js"></script>
<script>
(async function() {
const { renderCard, ago, escapeHtml } = SessionCard;

const FETCH_URL = "/api/sessions";
const POLL_FALLBACK_MS = 4000;

let lastSnapshot = null;
let allSessions = [];
let activeFilter = "all";
let searchQuery = "";
const projectsEl = document.getElementById("projects");
const emptyState = document.getElementById("empty-state");
const filtersEl = document.getElementById("filters");
const lastUpdateEl = document.getElementById("last-update");
const connBadge = document.getElementById("connection-badge");
const connText = document.getElementById("connection-text");
const searchInput = document.getElementById("search-input");
const themeToggle = document.getElementById("theme-toggle");
const modalOverlay = document.getElementById("modal-overlay");
const modalClose = document.getElementById("modal-close");
const modalTitle = document.getElementById("modal-title");
const modalMeta = document.getElementById("modal-meta");
const modalBody = document.getElementById("modal-body");

let statusColors;

// ─── 暗色模式 ───
function setTheme(dark) {
  document.documentElement.classList.toggle("dark", dark);
  themeToggle.textContent = dark ? "☀️" : "🌙";
  try { localStorage.setItem("sm-theme", dark ? "dark" : "light"); } catch {}
  if (statusColors) applyStatusColors(statusColors);
}
function initTheme() {
  const saved = localStorage.getItem("sm-theme");
  if (saved) { setTheme(saved === "dark"); return; }
  setTheme(window.matchMedia("(prefers-color-scheme: dark)").matches);
}
themeToggle.addEventListener("click", () => {
  setTheme(!document.documentElement.classList.contains("dark"));
});
initTheme();

// ─── 状态颜色设置 ───
const STATUS_KEYS = [
  { key: "working", label: "执行中" },
  { key: "interrupt", label: "等待输入" },
  { key: "waiting", label: "等待中" },
  { key: "idle", label: "空闲" },
  { key: "done", label: "已完成" },
];
const DEFAULT_COLORS = {
  working: "#52b788", interrupt: "#e9b741", waiting: "#1a73e8",
  idle: "#b8860b", done: "#6b7a8a",
};

function loadStatusColors() {
  try { return JSON.parse(localStorage.getItem("sm-colors")) || { ...DEFAULT_COLORS }; }
  catch { return { ...DEFAULT_COLORS }; }
}
function saveStatusColors(colors) {
  try { localStorage.setItem("sm-colors", JSON.stringify(colors)); } catch {}
}
function applyStatusColors(colors) {
  const root = document.documentElement;
  for (const { key } of STATUS_KEYS) {
    const c = colors[key] || DEFAULT_COLORS[key];
    root.style.setProperty(`--color-${key}`, c);
    // 自动生成背景色：用 color-mix 的近似值
    const r = parseInt(c.slice(1,3), 16), g = parseInt(c.slice(3,5), 16), b = parseInt(c.slice(5,7), 16);
    const isDark = root.classList.contains("dark");
    const bg = isDark
      ? `rgb(${Math.round(r*0.15)},${Math.round(g*0.15)},${Math.round(b*0.15)})`
      : `rgb(${Math.round(r+(255-r)*0.82)},${Math.round(g+(255-g)*0.82)},${Math.round(b+(255-b)*0.82)})`;
    root.style.setProperty(`--color-${key}-bg`, bg);
  }
}

statusColors = loadStatusColors();
applyStatusColors(statusColors);

function renderSettings() {
  const grid = document.getElementById("settings-grid");
  grid.innerHTML = STATUS_KEYS.map(({ key, label }) => {
    const c = statusColors[key] || DEFAULT_COLORS[key];
    return `<div class="settings-row">
      <label class="settings-label" for="color-${key}">${label}</label>
      <div class="settings-picker">
        <input type="color" id="color-${key}" class="color-picker" value="${c}" />
        <span class="color-hex" id="hex-${key}">${c}</span>
      </div>
    </div>`;
  }).join("");
  // 绑定颜色选择事件
  STATUS_KEYS.forEach(({ key }) => {
    const input = document.getElementById(`color-${key}`);
    const hex = document.getElementById(`hex-${key}`);
    if (!input) return;
    input.addEventListener("input", () => {
      statusColors[key] = input.value;
      hex.textContent = input.value;
      saveStatusColors(statusColors);
      applyStatusColors(statusColors);
    });
  });
}

// 设置弹窗开关
const settingsOverlay = document.getElementById("settings-overlay");
const settingsClose = document.getElementById("settings-close");
const settingsReset = document.getElementById("settings-reset");
document.getElementById("settings-btn").addEventListener("click", () => {
  renderSettings();
  settingsOverlay.style.display = "flex";
});
settingsClose.addEventListener("click", () => { settingsOverlay.style.display = "none"; });
settingsOverlay.addEventListener("click", e => { if (e.target === settingsOverlay) settingsOverlay.style.display = "none"; });
settingsReset.addEventListener("click", () => {
  statusColors = { ...DEFAULT_COLORS };
  saveStatusColors(statusColors);
  applyStatusColors(statusColors);
  renderSettings();
});

// ─── 搜索 ───
searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  renderAll(lastSnapshot);
});

// ─── 详情弹窗 ───
function openModal(sessionId) {
  modalOverlay.style.display = "flex";
  modalBody.innerHTML = '<div class="modal-loading">加载中…</div>';
  const session = allSessions.find(s => s.fullId === sessionId || s.id === sessionId);
  if (session) {
    modalTitle.textContent = session.title || `# ${session.id}`;
    modalMeta.textContent = `${session.project} · ${session.latestModel || "—"}`;
  } else {
    modalTitle.textContent = `# ${sessionId.slice(0, 8)}`;
    modalMeta.textContent = "";
  }
  fetch(`/api/session-timeline?sessionId=${encodeURIComponent(sessionId)}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) { modalBody.innerHTML = `<div class="modal-error">${escapeHtml(data.error)}</div>`; return; }
      if (!data.events || data.events.length === 0) {
        modalBody.innerHTML = '<div class="modal-error">暂无事件记录</div>';
        return;
      }
      let html = "";
      for (const ev of data.events) {
        let label = ev.type;
        let cls = "entry-user";
        if (ev.type === "assistant") { label = "AI"; cls = "entry-assistant"; }
        else if (ev.type === "user") { label = "用户"; cls = "entry-user"; }
        else if (ev.isRename) { label = "改名"; cls = "entry-rename"; }
        else if (ev.command) { label = "命令"; cls = "entry-cmd"; }
        else { label = ev.type; cls = "entry-other"; }

        const time = ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString() : "";
        const content = escapeHtml(ev.content || "");
        const cmd = ev.command ? escapeHtml(ev.command) : "";
        const toolBadge = ev.hasToolUse ? '<span class="entry-tool-badge">🔧 工具调用</span>' : "";
        const renameBadge = ev.isRename ? '<span class="entry-rename-badge">✏️ 重命名</span>' : "";

        html += `<div class="entry ${cls}">
          <div class="entry-head">
            <span class="entry-label">${label}</span>
            <span class="entry-time">${time}</span>
            ${toolBadge}${renameBadge}
          </div>
          ${content ? `<div class="entry-body">${content}</div>` : ""}
          ${cmd ? `<div class="entry-cmd-body"><code>${cmd}</code></div>` : ""}
        </div>`;
      }
      modalBody.innerHTML = html;
    })
    .catch(() => {
      modalBody.innerHTML = '<div class="modal-error">加载失败</div>';
    });
}
function closeModal() { modalOverlay.style.display = "none"; }
modalClose.addEventListener("click", closeModal);
modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ─── 渲染过滤器 ───
function renderFilters(snapshot) {
  const projects = snapshot.projects || [];
  const total = snapshot.total || 0;
  const counts = snapshot.counts || {};

  document.getElementById("count-working").textContent = counts.working || 0;
  document.getElementById("count-interrupt").textContent = counts.interrupt || 0;
  document.getElementById("count-waiting").textContent = counts.waiting || 0;
  document.getElementById("count-idle").textContent = counts.idle || 0;
  document.getElementById("count-done").textContent = counts.done || 0;
  document.getElementById("total-count").textContent = total;
  document.getElementById("total-count-top").textContent = total;

  let html = `<button class="filter-btn ${activeFilter === "all" ? "active" : ""}" data-filter="all">全部 <span class="count">${total}</span></button>`;
  for (const p of projects) {
    const cnt = p.sessions.length;
    const isActive = activeFilter === p.name;
    html += `<button class="filter-btn ${isActive ? "active" : ""}" data-filter="${escapeHtml(p.name)}">${escapeHtml(p.name)} <span class="count">${cnt}</span></button>`;
  }
  filtersEl.innerHTML = html;

  filtersEl.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeFilter = btn.dataset.filter;
      renderAll(lastSnapshot);
    });
  });
}

// ─── 渲染卡片网格 ───
function renderProjects(snapshot) {
  if (!snapshot) return;
  let sessions = snapshot.sessions || [];
  const total = snapshot.total || 0;

  if (total === 0) {
    emptyState.style.display = "";
    projectsEl.innerHTML = `<div class="empty-state" id="empty-state"><div class="icon">⊡</div><h2>等待会话数据</h2><p>Claude Code 会话日志将在此实时显示。</p></div>`;
    return;
  }
  emptyState.style.display = "none";

  // 搜索过滤
  if (searchQuery) {
    sessions = sessions.filter(s =>
      (s.title || "").toLowerCase().includes(searchQuery) ||
      (s.latestPrompt || "").toLowerCase().includes(searchQuery) ||
      (s.summary || "").toLowerCase().includes(searchQuery) ||
      s.id.includes(searchQuery)
    );
  }

  // 状态优先级排序
  const priority = { working: 0, interrupt: 1, waiting: 2, idle: 3, done: 4 };
  const sorted = [...sessions].sort((a, b) => {
    const pa = priority[a.status] || 9;
    const pb = priority[b.status] || 9;
    if (pa !== pb) return pa - pb;
    return new Date(b.lastActivityAt).getTime() - new Date(a.lastActivityAt).getTime();
  });

  if (sorted.length === 0) {
    projectsEl.innerHTML = '<div class="empty-state"><div class="icon">⊡</div><h2>无匹配结果</h2><p>尝试修改搜索条件或筛选。</p></div>';
    return;
  }

  projectsEl.innerHTML = '<div class="session-grid">' +
    sorted.map(s => renderCard(s, { activeFilter })).join("") +
    '</div>';

  // 卡片点击 → 详情弹窗
  document.querySelectorAll(".card").forEach(card => {
    card.style.cursor = "pointer";
    card.addEventListener("click", () => {
      const idx = Array.from(card.parentNode.children).indexOf(card);
      // 通过点击的卡片找到对应的 session
      const titleEl = card.querySelector(".card-title");
      if (!titleEl) return;
      const name = titleEl.textContent;
      const session = sorted.find(s => {
        if (s.title) return name === s.title;
        return name.includes(s.id);
      });
      if (session) openModal(session.fullId || session.id);
    });
  });
}

// ─── 全量渲染入口 ───
function renderAll(snapshot) {
  if (!snapshot) return;
  lastSnapshot = snapshot;
  allSessions = snapshot.sessions || [];

  let filteredSessions = allSessions;
  if (activeFilter !== "all") {
    filteredSessions = allSessions.filter(s => s.project === activeFilter);
  }

  const displaySnapshot = { ...snapshot, sessions: filteredSessions, total: filteredSessions.length };
  renderProjects(displaySnapshot);
  renderFilters(snapshot);
  lastUpdateEl.textContent = ago(snapshot.generatedAt);
}

// ─── 连接状态 ───
function setConnection(online) {
  if (online) {
    connBadge.className = "connection-badge";
    connText.textContent = "实时";
  } else {
    connBadge.className = "connection-badge offline";
    connText.textContent = "断开";
  }
}

// ─── SSE ───
if (window.EventSource) {
  const es = new EventSource("/api/sse");
  es.onmessage = e => {
    try { setConnection(true); renderAll(JSON.parse(e.data)); } catch {}
  };
  es.onerror = () => {
    setConnection(false);
    setTimeout(fetchSnapshot, 500);
  };
} else {
  setTimeout(fetchSnapshot, 1000);
}

async function fetchSnapshot() {
  try {
    const r = await fetch(FETCH_URL);
    setConnection(true); renderAll(await r.json());
  } catch { setConnection(false); }
  setTimeout(fetchSnapshot, POLL_FALLBACK_MS);
}

try {
  const r = await fetch(FETCH_URL);
  renderAll(await r.json());
} catch {}

// 定时刷新活动时间
setInterval(() => {
  if (!lastSnapshot) return;
  lastUpdateEl.textContent = ago(lastSnapshot.generatedAt);
}, 30000);

})();
</script>
</body>
</html>
