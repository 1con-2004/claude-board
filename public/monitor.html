<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>监控 | ClaudeBoard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="monitor">
    <main class="dashboard-shell">
      <header class="topbar panel-shell">
        <div class="brand-lockup">
          <div class="brand-mark">CB</div>
          <div>
            <h1 data-i18n="brandTitle">ClaudeBoard</h1>
          </div>
        </div>
        <nav class="page-nav" aria-label="主导航">
          <a href="/" data-i18n="nav.home">首页</a>
          <a class="is-active" href="/monitor.html" data-i18n="nav.monitor">监控</a>
          <a href="/trends.html" data-i18n="nav.trends">趋势</a>
          <a href="/history.html" data-i18n="nav.history">历史</a>
        </nav>
        <div class="header-side">
          <div class="language-toggle" id="language-toggle"></div>
          <button class="ghost-button theme-toggle" id="theme-toggle" type="button" aria-label="切换主题" title="切换主题">🌙</button>
          <div class="connection-pill" id="connection-pill">
            <span class="pulse-dot"></span>
            <span id="connection-text">实时连接正常</span>
          </div>
        </div>
      </header>

      <section class="panel-shell feature-panel monitor-hero">
        <div class="section-heading">
          <h2 data-i18n="monitor.overview.eyebrow">运行状态</h2>
        </div>
        <div id="monitor-overview" class="summary-grid three-up"></div>
      </section>

      <section class="panel-shell feature-panel">
        <div class="section-heading">
          <h2 data-i18n="monitor.runtime.eyebrow">监控路径</h2>
        </div>
        <div id="monitor-matrix" class="monitor-matrix"></div>
      </section>
    </main>

    <script src="/scripts/dashboard-core.js"></script>
    <script src="/scripts/monitor-page.js"></script>
  </body>
</html>
